<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--yk-bg);font-family:var(--yk-font-family);color:var(--yk-text);}
  .wrap{padding:20px 24px;display:flex;gap:14px}
  .card{flex:1;background:var(--yk-surface);border:1px solid var(--yk-border-subtle);border-radius:24px;padding:12px;display:flex;gap:12px;align-items:center}
  .thumb{width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,#3A6B8A,#1A3548);flex-shrink:0;position:relative;overflow:hidden}
  .thumb.studio{background:linear-gradient(135deg,#4a5d78,#2a3749)}
  .info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .name{font:var(--yk-text-title);color:var(--yk-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sub{font:var(--yk-text-caption);color:var(--yk-text-muted)}
  .meta{display:flex;align-items:center;gap:6px;margin-top:4px}
  .rating{display:inline-flex;align-items:center;gap:3px;font:var(--yk-text-caption);color:var(--yk-text)}
  .rating svg{color:var(--yk-accent)}
  .dist{font:var(--yk-text-caption-xs);color:var(--yk-text-muted)}
  .heart{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:99px;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
  .verified{width:14px;height:14px;border-radius:99px;background:#99E271;display:inline-flex;align-items:center;justify-content:center;color:#0F1115;font:700 9px Gilroy}
</style></head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="thumb">
        <div class="heart"><svg width="12" height="12" viewBox="0 0 24 24" fill="#6BCEFF" stroke="#6BCEFF"><path d="M12 21s-7-4.35-7-10a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 5.65-7 10-7 10Z"/></svg></div>
      </div>
      <div class="info">
        <div class="name">Диана Каримова <span class="verified">✓</span></div>
        <div class="sub">Бровист · 4 года</div>
        <div class="meta">
          <span class="rating"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 3 7 7 .5-5.5 4.5 2 7-6.5-4-6.5 4 2-7L2 9.5 9 9z"/></svg>4,9</span>
          <span class="dist">· 350 м</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="thumb studio"></div>
      <div class="info">
        <div class="name">Studio Prive</div>
        <div class="sub">Барбершоп · открыто до 22:00</div>
        <div class="meta">
          <span class="rating"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 3 7 7 .5-5.5 4.5 2 7-6.5-4-6.5 4 2-7L2 9.5 9 9z"/></svg>4,8</span>
          <span class="dist">· 1,2 км · от 80 тыс</span>
        </div>
      </div>
    </div>
  </div>
</body></html>
